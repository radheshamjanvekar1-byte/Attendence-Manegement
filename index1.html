<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance mangement system</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <h2>Attendence mangement system</h2>

    <table>
        <thead>
            <tr>
                <th> Student Name</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="attendenceList"></tbody>
</body>

</html>
